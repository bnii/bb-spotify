name: Release and update Homebrew tap

on:
  push:
    branches: [master]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump version tag
        id: tag
        uses: anothrNick/github-tag-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          WITH_V: true

      - name: Compute tarball SHA256
        id: sha
        run: |
          sleep 5  # allow tag to propagate
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${{ steps.tag.outputs.new_tag }}.tar.gz"
          SHA=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.tag.outputs.new_tag }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/bnii/homebrew-tap.git" tap
          cd tap
          sed -i "s|url \".*\"|url \"https://github.com/bnii/bb-spotify/archive/refs/tags/${VERSION}.tar.gz\"|" Formula/spotify.rb
          sed -i "s/sha256 \"[a-f0-9]\{64\}\"/sha256 \"${SHA256}\"/" Formula/spotify.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/spotify.rb
          git diff --cached --quiet || git commit -m "spotify ${VERSION}"
          git push
